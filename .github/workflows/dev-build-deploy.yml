name: DEV - Build and Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Build and deploy to cloudflare pages"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  DIST: dist/daybook-cloud-frontend/browser

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate config.json from template
        run: envsubst < public/config/config.tpl.json > public/config/config.json
        env:
          AUTH_AUTHORITY: ${{ vars.AUTH_AUTHORITY }}
          AUTH_CLIENT_ID: ${{ vars.AUTH_CLIENT_ID }}
          AUTH_REDIRECT_URI: ${{ vars.AUTH_REDIRECT_URI }}
          AUTH_POST_LOGOUT_REDIRECT: ${{ vars.AUTH_POST_LOGOUT_REDIRECT }}
          AUTH_AUDIENCE: ${{ vars.AUTH_AUDIENCE }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}

      - name: Build
        run: pnpm run build --configuration production

      - name: Write deployment info
        run: |
          mkdir -p ${{ env.DIST }}
          echo "branch=${GITHUB_REF_NAME}" > ${{ env.DIST }}/info.txt
          echo "commit=$(git rev-parse --short HEAD)" >> ${{ env.DIST }}/info.txt
          echo "time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> ${{ env.DIST }}/info.txt

      - name: Deploy to Cloudflare Pages
        run: |
          pnpm dlx wrangler pages deploy "${{ env.DIST }}" \
            --project-name "${{ vars.CF_PROJECT_NAME }}" \
            --branch "${DEPLOY_BRANCH:-${GITHUB_REF_NAME}}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ github.event.inputs.branch }}
