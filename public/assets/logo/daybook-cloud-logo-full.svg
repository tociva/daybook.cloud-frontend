<svg
  xmlns="http://www.w3.org/2000/svg"
  class="daybook-logo daybook-logo--full"
  width="224"
  height="64"
  viewBox="0 0 224 64"
  role="img"
  aria-labelledby="daybookLogoTitle-full daybookLogoDesc-full"
>
  <title id="daybookLogoTitle-full">Daybook.Cloud full logo</title>
  <desc id="daybookLogoDesc-full">Daybook.Cloud logo with D.C mark and wordmark.</desc>

  <style>
    .daybook-logo {
      color-scheme: light dark;
    }

    .daybook-logo__mark-bg {
      fill: var(--daybook-logo-mark-bg, var(--tng-semantic-accent-brand, #2563eb));
    }

    .daybook-logo__mark-text {
      fill: var(--daybook-logo-mark-text, var(--tng-semantic-foreground-inverse, #ffffff));
    }

    .daybook-logo__title {
      fill: var(--daybook-logo-title, var(--tng-semantic-foreground-primary, #111827));
    }

    .daybook-logo__caption {
      fill: var(--daybook-logo-caption, var(--tng-semantic-foreground-muted, #6b7280));
    }

    .daybook-logo__shadow {
      flood-color: var(--daybook-logo-shadow, var(--tng-semantic-accent-brand, #2563eb));
      flood-opacity: var(--daybook-logo-shadow-opacity, 0.28);
    }

    @media (prefers-color-scheme: dark) {
      .daybook-logo__mark-bg {
        fill: var(--daybook-logo-mark-bg, var(--tng-semantic-accent-brand, #3b82f6));
      }

      .daybook-logo__mark-text {
        fill: var(--daybook-logo-mark-text, var(--tng-semantic-foreground-inverse, #ffffff));
      }

      .daybook-logo__title {
        fill: var(--daybook-logo-title, var(--tng-semantic-foreground-primary, #f9fafb));
      }

      .daybook-logo__caption {
        fill: var(--daybook-logo-caption, var(--tng-semantic-foreground-muted, #cbd5e1));
      }

      .daybook-logo__shadow {
        flood-color: var(--daybook-logo-shadow, var(--tng-semantic-accent-brand, #60a5fa));
        flood-opacity: var(--daybook-logo-shadow-opacity, 0.34);
      }
    }
  </style>

  <defs>
    <filter id="daybookLogoShadow-full" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow
        class="daybook-logo__shadow"
        dx="0"
        dy="10"
        stdDeviation="10"
      />
    </filter>
  </defs>


