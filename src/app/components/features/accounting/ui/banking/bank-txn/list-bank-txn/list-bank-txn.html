<app-item-landing
  [items]="bankTxns()"
  [count]="count()"
  [createButtonText]="'Create New Bank Transaction'"
  [title]="'Bank Transactions'"
  [pageSize]="pageSize()"
  [currentPage]="currentPage()"
  [error]="error()"
  [columns]="columns()"
  [emptyListMessage]="emptyListMessage()"
  [onCreateItem]="handleOnCreateItem()"
  [onEditItem]="handleOnEditItem()"
  [onDeleteItem]="handleOnDeleteItem()"
  [button2Caption]="'Manage Bank Ledger Maps'"
  [onButton2Click]="handleOnButton2Click()"
  bulkUploadLabel="Upload Bank Transactions in Bulk"
  bulkUploadHint="Drop your json file here, or click to choose"
  bulkUploadAccept=".json"
  [bulkUploadMultiple]="false"
  bulkUploadSizeClass="w-full h-12"
  bulkUploadSampleFileUrl="/assets/bulk-upload-examples/bank-txn.json"
  (filesSelected)="handleOnFilesSelected($event)"
/>
