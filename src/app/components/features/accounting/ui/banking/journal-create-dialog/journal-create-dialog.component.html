<tng-dialog
  title="Create journal"
  description="Record journal entries for this bank transaction."
  [style.--tng-dialog-width]="dialogWidth"
  [style.--tng-dialog-height]="dialogHeight"
  [open]="open()"
  [closeOnBackdrop]="false"
  [closeOnEscape]="!isSaving()"
  (closed)="onDialogClosed()"
>
  @if (open()) {
    <div class="journal-dialog-body">
      <app-journal-create-form />
    </div>
  }

  <footer class="dialog-footer">
    @if (bankTxnStore.error()) {
      <div class="notice notice--danger dialog-footer__error">{{ bankTxnStore.error() }}</div>
    }

    <div class="dialog-footer__toolbar">
      <div class="dialog-footer__row">
        <tng-form-field
          class="dialog-footer__amount"
          labelPosition="outline"
          [invalid]="matchedAmountError() !== null"
        >
          <tng-label forId="bank-txn-matched-amount" required>Matched amount</tng-label>
          <tng-input
            id="bank-txn-matched-amount"
            type="number"
            inputmode="decimal"
            placeholder="Amount to match"
            [value]="matchedAmount()"
            (valueChange)="matchedAmount.set($any($event) ?? '')"
          />
          <tng-error [show]="matchedAmountError() !== null">{{ matchedAmountError() }}</tng-error>
        </tng-form-field>
      </div>

      <div class="dialog-footer__row dialog-footer__actions">
        <tng-button
          type="button"
          appearance="outline"
          tone="neutral"
          [disabled]="isSaving()"
          (click)="onCancelled()"
        >
          Cancel
        </tng-button>

        <tng-button
          type="button"
          appearance="solid"
          tone="primary"
          [disabled]="isSaving()"
          (click)="onSubmit()"
        >
          @if (isSaving()) {
            <tng-icon icon="loaderCircle" aria-hidden="true" />
            Creating...
          } @else {
            <tng-icon icon="plus" aria-hidden="true" />
            Create journal
          }
        </tng-button>
      </div>
    </div>
  </footer>
</tng-dialog>
