<main class="journal-page">
  <header class="journal-header">
    <h1>{{ title() }}</h1>
  </header>

  @if (journalStore.error()) {
    <div class="notice notice--danger">{{ journalStore.error() }}</div>
  }

  <form (submit)="submitForm($event)" novalidate>
    <div class="journal-layout">
      <div class="journal-main">
        <app-journal-entries
          [documents]="selectedDocuments()"
          [pendingFiles]="pendingDocumentFiles()"
          [documentsDisabled]="isSaving()"
          [documentsUploading]="isUploadingDocuments()"
          (pendingFilesChange)="pendingDocumentFiles.set($event)"
          (documentRemove)="deleteDocument($event)"
        />
      </div>
      <aside class="journal-aside">
        <app-journal-details [isEdit]="mode() === 'edit'" />
      </aside>
    </div>

    <div class="journal-actions">
      <app-burl-back-button label="Cancel" />
      <app-burl-create-button
        [type]="'button'"
        [icon]="mode() === 'edit' ? 'save' : 'plus'"
        [label]="mode() === 'edit' ? 'Save changes' : 'Create journal'"
        [disabled]="isSaving()"
        (clicked)="submitForm($event)"
      />
    </div>
  </form>
</main>
