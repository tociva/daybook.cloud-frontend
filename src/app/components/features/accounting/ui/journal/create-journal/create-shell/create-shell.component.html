<main class="journal-page">
  <header class="journal-header">
    <h1>{{ title() }}</h1>
  </header>

  <app-journal-create-form [journalId]="id()" />

  <div class="journal-actions">
    <app-burl-back-button label="Cancel" />
    @if (canClone()) {
      <tng-button type="button" appearance="outline" tone="neutral" (click)="clone()">
        <tng-icon icon="copy" aria-hidden="true" />
        Clone
      </tng-button>
    }
    <app-burl-create-button
      [type]="'button'"
      [icon]="submitIcon()"
      [label]="submitLabel()"
      [disabled]="isSaving()"
      (clicked)="onSubmit($event)"
    />
  </div>
</main>
