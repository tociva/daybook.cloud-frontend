<div class="trial-balance-container">
  <div class="page-header-row">
    <app-page-heading
      title="Trial Balance Report"
      subtitle="Ledger balances for the selected period"
    >
    </app-page-heading>

    <div class="filter-section">
      <div class="filter-controls">
        <div class="date-filter">
          <app-fiscal-year-date-range-picker
            id="date-range"
            placeholder="Select report period"
            [fullWidth]="false"
            [value]="pickerValue()"
            (valueChange)="onDateRangeChange($event)"
            (closed)="onPickerClosed()"
          />
        </div>
        <tng-button
          type="button"
          (click)="onRefresh()"
          [disabled]="isReportLoading()"
          kind="secondary"
        >
          <tng-icon icon="refresh-cw" />
          Refresh
        </tng-button>
      </div>
    </div>
  </div>

  <tng-card class="trial-balance-card">

    @if (hasError()) {
      <div class="error-message">
        <tng-icon icon="alert-circle" />
        {{ displayError() }}
      </div>
    }

    @if (!hasError()) {
      <div class="table-wrapper">
        <tng-tree-table
          ariaLabel="Trial Balance Report"
          density="comfortable"
          [columns]="columns"
          [data]="trialBalanceTreeData()"
          [loading]="isReportLoading()"
          loadingText="Loading trial balance..."
          emptyText="No ledger categories found."
          treeColumnKey="name"
          [expandOnRowClick]="true"
          [expandedKeys]="expandedKeys()"
          [getKey]="getTreeRowKey"
          [getChildren]="getTreeRowChildren"
          [rowClass]="getTreeRowClass"
          (expandedKeysChange)="onExpandedKeysChange($event)"
        />
      </div>

      @if (!isReportLoading() && updatedAt()) {
        <div class="report-footer">
          <div class="updated-info">
            Last updated: {{ updatedAt() | date: 'short' }}
          </div>
        </div>
      }
    }
  </tng-card>
</div>
