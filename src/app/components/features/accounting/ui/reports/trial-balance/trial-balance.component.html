<main class="management-page">
  <app-page-heading
    eyebrow="Accounting"
    title="Trial Balance Report"
    description="Ledger balances for the selected period"
  >
    <div class="date-filter">
      <app-fiscal-year-date-range-picker
        id="date-range"
        placeholder="Select report period"
        [fullWidth]="false"
        [value]="pickerValue()"
        (valueChange)="onDateRangeChange($event)"
        (closed)="onPickerClosed()"
      />
    </div>

    <tng-button
      type="button"
      appearance="outline"
      tone="neutral"
      (click)="onRefresh()"
      [disabled]="isReportLoading()"
    >
      <tng-icon icon="refresh-cw" aria-hidden="true" />
      Refresh
    </tng-button>
  </app-page-heading>

  <tng-card variant="outline" padding="lg">

    @if (hasError()) {
      <div class="notice notice--danger">
        {{ displayError() }}
      </div>
    }

    @if (!hasError()) {
      <div class="table-stack">
        <tng-tree-table
          ariaLabel="Trial Balance Report"
          density="comfortable"
          [columns]="columns"
          [data]="trialBalanceTreeData()"
          [loading]="isReportLoading()"
          loadingText="Loading trial balance..."
          emptyText="No ledger categories found."
          treeColumnKey="name"
          [expandOnRowClick]="true"
          [expandedKeys]="expandedKeys()"
          [getKey]="getTreeRowKey"
          [getChildren]="getTreeRowChildren"
          [rowClass]="getTreeRowClass"
          (expandedKeysChange)="onExpandedKeysChange($event)"
        />
      </div>

      @if (!isReportLoading() && updatedAt()) {
        <div class="table-footer">
          <div class="updated-info">
            Last updated: {{ formatUpdatedAt(updatedAt()) }}
          </div>
        </div>
      }
    }
  </tng-card>
</main>
