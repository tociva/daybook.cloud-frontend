<main class="management-page">
  <app-page-heading
    eyebrow="Management"
    title="Branches"
    description="Manage your branches and their financial settings."
  >
    <app-crud-filter-popover
      ariaLabel="Branch filters"
      title="Filter branches"
      [fields]="filterFields"
      [filter]="crudQuery.filter()"
      syncUrl
    />

    <tng-button type="button" appearance="solid" tone="primary" (click)="createBranch()">
      <tng-icon icon="plus" aria-hidden="true" />
      New branch
    </tng-button>
  </app-page-heading>

  <tng-card variant="outline" padding="lg">
    @if (branchStore.error()) {
      <div class="notice notice--danger">{{ branchStore.error() }}</div>
    }

    <div class="table-stack">
      @if (!branchStore.isLoading() && !hasError() && branchStore.items().length === 0) {
        @if (crudQuery.hasActiveFilter()) {
          <app-empty-state
            icon="searchX"
            title="No branches match your filter"
            description="Try adjusting or clearing your filter to find what you're looking for."
          >
            <tng-button type="button" appearance="outline" tone="neutral" (click)="crudQuery.clearFilter()">
              Clear filter
            </tng-button>
          </app-empty-state>
        } @else {
          <app-empty-state
            icon="building"
            title="No branches yet"
            description="Get started by creating your first branch."
          >
            <tng-button type="button" appearance="solid" tone="primary" (click)="createBranch()">
              <tng-icon icon="plus" aria-hidden="true" />
              New branch
            </tng-button>
          </app-empty-state>
        }
      } @else {
      <tng-table
        ariaLabel="Branches"
        density="comfortable"
        [columns]="columns"
        [items]="branchStore.items()"
        [loading]="branchStore.isLoading()"
        [error]="hasError()"
        [sortActive]="crudQuery.sortActive()"
        [sortDirection]="crudQuery.sortDirection()"
        (sortChange)="crudQuery.applySort($event)"
      >
        <ng-template tngTableCellTemplate="name" let-row="row">
          <button type="button" class="link-button" (click)="viewBranch(row)">
            {{ row.name }}
          </button>
        </ng-template>

        <ng-template tngTableCellTemplate="mobile" let-row="row">
          {{ row.mobile || '—' }}
        </ng-template>

        <ng-template tngTableCellTemplate="description" let-row="row">
          {{ row.description || '—' }}
        </ng-template>

        <ng-template tngTableCellTemplate="actions" let-row="row">
          <div class="row-actions">
            <button
              type="button"
              class="action-icon"
              aria-label="View branch"
              (click)="viewBranch(row)"
            >
              <tng-icon icon="eye" aria-hidden="true" />
            </button>
            <button
              type="button"
              class="action-icon"
              aria-label="Edit branch"
              (click)="editBranch(row)"
            >
              <tng-icon icon="pencil" aria-hidden="true" />
            </button>
            <button
              type="button"
              class="action-icon action-icon--danger"
              aria-label="Delete branch"
              (click)="deleteBranch(row)"
            >
              <tng-icon icon="trash2" aria-hidden="true" />
            </button>
          </div>
        </ng-template>
      </tng-table>

      <div class="table-footer">
        <app-crud-paginator
          ariaLabel="Branch pagination"
          [filter]="crudQuery.filter()"
          [totalItems]="branchStore.count()"
          [pageSizeOptions]="crudQuery.pageSizeOptions()"
          syncUrl
        />
      </div>
      }
    </div>
  </tng-card>
</main>
