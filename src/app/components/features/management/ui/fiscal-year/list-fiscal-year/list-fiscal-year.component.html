<main class="management-page">
  <app-page-heading
    eyebrow="Management"
    title="Fiscal Years"
    description="Manage fiscal years across your branches."
  >
    <app-crud-filter-popover
      ariaLabel="Fiscal year filters"
      title="Filter fiscal years"
      [fields]="filterFields"
      [filter]="crudQuery.filter()"
      syncUrl
    />

    <tng-button type="button" appearance="solid" tone="primary" (click)="createFiscalYear()">
      <tng-icon icon="plus" aria-hidden="true" />
      New fiscal year
    </tng-button>
  </app-page-heading>

  <tng-card variant="outline" padding="lg">
    @if (fiscalYearStore.error()) {
      <div class="notice notice--danger">{{ fiscalYearStore.error() }}</div>
    }

    <div class="table-stack">
      <tng-table
        ariaLabel="Fiscal years"
        density="comfortable"
        [columns]="columns"
        [items]="fiscalYearStore.items()"
        [loading]="fiscalYearStore.isLoading()"
        [error]="hasError()"
        [sortActive]="crudQuery.sortActive()"
        [sortDirection]="crudQuery.sortDirection()"
        (sortChange)="crudQuery.applySort($event)"
      >
        <ng-template tngTableCellTemplate="name" let-row="row">
          <button type="button" class="link-button" (click)="viewFiscalYear(row)">
            {{ row.name || '—' }}
          </button>
        </ng-template>

        <ng-template tngTableCellTemplate="startdate" let-row="row">
          {{ formatDate(row.startdate) }}
        </ng-template>

        <ng-template tngTableCellTemplate="enddate" let-row="row">
          {{ formatDate(row.enddate) }}
        </ng-template>

        <ng-template tngTableCellTemplate="branch" let-row="row">
          {{ row.branch?.name || '—' }}
        </ng-template>

        <ng-template tngTableCellTemplate="currencycode" let-row="row">
          {{ row.currencycode || '—' }}
        </ng-template>

        <ng-template tngTableCellTemplate="actions" let-row="row">
          <div class="row-actions">
            <button
              type="button"
              class="action-icon"
              aria-label="View fiscal year"
              (click)="viewFiscalYear(row)"
            >
              <tng-icon icon="eye" aria-hidden="true" />
            </button>
            <button
              type="button"
              class="action-icon"
              aria-label="Edit fiscal year"
              (click)="editFiscalYear(row)"
            >
              <tng-icon icon="pencil" aria-hidden="true" />
            </button>
            <button
              type="button"
              class="action-icon action-icon--danger"
              aria-label="Delete fiscal year"
              (click)="deleteFiscalYear(row)"
            >
              <tng-icon icon="trash2" aria-hidden="true" />
            </button>
          </div>
        </ng-template>
      </tng-table>

      <div class="table-footer">
        <app-crud-paginator
          ariaLabel="Fiscal year pagination"
          [filter]="crudQuery.filter()"
          [totalItems]="fiscalYearStore.count()"
          [pageSizeOptions]="crudQuery.pageSizeOptions()"
          syncUrl
        />
      </div>
    </div>
  </tng-card>
</main>
