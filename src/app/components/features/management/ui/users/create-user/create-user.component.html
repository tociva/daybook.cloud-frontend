<main class="management-page">
  <form (submit)="save($event)">
    <tng-card variant="outline" padding="lg">
      <tng-card-header>
        <tng-card-title>{{ title() }}</tng-card-title>
        <tng-card-description>{{ subtitle() }}</tng-card-description>
      </tng-card-header>

      <tng-card-content>
        @if (memberStore.error()) {
          <div class="notice notice--danger">{{ memberStore.error() }}</div>
        }

        @if (formError()) {
          <div class="notice notice--danger">{{ formError() }}</div>
        }

        @if (memberStore.isLoading() && mode() === 'edit' && !memberStore.selectedItem()) {
          <div class="notice">Loading user...</div>
        } @else {
          <div class="fields-grid">
            <tng-form-field
              class="field field--full"
              #userInputRef
              labelPosition="above"
              [invalid]="userError() !== null"
            >
              <tng-label>Email</tng-label>
              <tng-input
                [value]="userid()"
                type="email"
                placeholder="name@example.com"
                (input)="onUserInput($event)"
              />
              @if (userError()) {
                <p class="field-error">{{ userError() }}</p>
              }
            </tng-form-field>

            <div class="field field--full">
              <app-member-permissions-editor
                [organization]="organization()"
                [permissions]="permissions()"
                (permissionsChange)="onPermissionsChange($event)"
              />
            </div>
          </div>
        }
      </tng-card-content>

      <tng-card-footer>
        <tng-card-actions align="end">
          <app-burl-back-button />
          <app-burl-create-button
            [label]="mode() === 'edit' ? 'Save user' : 'Invite user'"
            [disabled]="isSubmitting() || memberStore.isLoading()"
          />
        </tng-card-actions>
      </tng-card-footer>
    </tng-card>
  </form>
</main>
