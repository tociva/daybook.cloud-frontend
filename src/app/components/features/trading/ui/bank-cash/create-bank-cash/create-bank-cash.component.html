<main class="bank-cash-page">
  <form novalidate (submit)="submitForm($event)">
    <tng-card variant="outline" padding="lg">
      <tng-card-header>
        <tng-card-title>{{ title() }}</tng-card-title>
        <tng-card-description>
          Add the name and description for a bank or cash account.
        </tng-card-description>
      </tng-card-header>

      <tng-card-content>
        @if (bankCashStore.error()) {
          <div class="notice notice--danger">{{ bankCashStore.error() }}</div>
        }

        @if (bankCashStore.isLoading() && mode() === 'edit' && !bankCashStore.selectedItem()) {
          <div class="notice">Loading account...</div>
        } @else {
          <div class="field-grid">
            <div class="field">
              <tng-form-field labelPosition="above" [invalid]="nameError() !== null">
                <tng-label forId="bank-cash-name" required>Name</tng-label>
                <tng-input
                  #nameInputRef
                  id="bank-cash-name"
                  placeholder="Cash counter"
                  [formField]="bankCashForm.name"
                  [ariaInvalid]="nameError() !== null"
                />
                <tng-error [show]="nameError() !== null">{{ nameError() }}</tng-error>
              </tng-form-field>
            </div>

            <div class="field field--wide">
              <tng-form-field labelPosition="above">
                <tng-label forId="bank-cash-description">Description</tng-label>
                <tng-textarea
                  id="bank-cash-description"
                  placeholder="Internal notes for this account"
                  rows="4"
                  [formField]="bankCashForm.description"
                />
              </tng-form-field>
            </div>
          </div>
        }
      </tng-card-content>

      <tng-card-footer>
        <tng-card-actions align="end">
          <app-burl-back-button label="Cancel" />
          <tng-button
            type="submit"
            appearance="solid"
            tone="primary"
            [disabled]="bankCashStore.isLoading()"
          >
            <tng-icon icon="save" aria-hidden="true" />
            Save
          </tng-button>
        </tng-card-actions>
      </tng-card-footer>
    </tng-card>
  </form>
</main>
