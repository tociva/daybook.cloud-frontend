<main class="bank-cash-page">
  <section class="page-heading">
    <div>
      <p class="eyebrow">Trading</p>
      <h1>Bank & Cash</h1>
      <p class="subtle">Manage cash counters, bank ledgers, and payment accounts.</p>
    </div>

    <div class="page-actions">
      <app-crud-filter-popover
        ariaLabel="Bank and cash filters"
        title="Filter accounts"
        [fields]="filterFields"
        [where]="currentWhere()"
        (filterApply)="applyFilters($event)"
        (clearFilters)="clearFilter()"
      />

      <tng-button type="button" appearance="solid" tone="primary" (click)="createBankCash()">
        <tng-icon icon="plus" aria-hidden="true" />
        New account
      </tng-button>
    </div>
  </section>

  <tng-card variant="outline" padding="lg">
    @if (bankCashStore.error()) {
      <div class="notice notice--danger">{{ bankCashStore.error() }}</div>
    }

    <div class="table-stack">
      <tng-table
        ariaLabel="Bank and cash accounts"
        density="comfortable"
        [columns]="columns"
        [items]="bankCashStore.items()"
        [loading]="bankCashStore.isLoading()"
        [error]="hasError()"
        [sortActive]="sortActive()"
        [sortDirection]="sortDirection()"
        (sortChange)="onSortChange($event)"
      >
        <ng-template tngTableCellTemplate="name" let-row="row">
          <button type="button" class="link-button" (click)="viewBankCash(row)">
            {{ row.name }}
          </button>
        </ng-template>

        <ng-template tngTableCellTemplate="description" let-row="row">
          {{ row.description || 'No description' }}
        </ng-template>

        <ng-template tngTableCellTemplate="status" let-row="row">
          <tng-tag
            appearance="soft"
            size="sm"
            [tone]="getStatusTone(row.status)"
            [label]="getStatusLabel(row.status)"
          >
            <span tngTagIcon class="status-dot" aria-hidden="true"></span>
            {{ getStatusLabel(row.status) }}
          </tng-tag>
        </ng-template>

        <ng-template tngTableCellTemplate="actions" let-row="row">
          <div class="row-actions">
            <tng-icon
              icon="eye"
              class="action-icon"
              label="View bank/cash account"
              tabindex="0"
              (click)="viewBankCash(row)"
              (keydown)="handleActionKeydown($event, row, 'view')"
            />
            <tng-icon
              icon="pencil"
              class="action-icon"
              label="Edit bank/cash account"
              tabindex="0"
              (click)="editBankCash(row)"
              (keydown)="handleActionKeydown($event, row, 'edit')"
            />
            <tng-icon
              icon="trash2"
              class="action-icon action-icon--danger"
              label="Delete bank/cash account"
              tabindex="0"
              (click)="deleteBankCash(row)"
              (keydown)="handleActionKeydown($event, row, 'delete')"
            />
          </div>
        </ng-template>
      </tng-table>

      <div class="table-footer">
        <app-crud-paginator
          ariaLabel="Bank and cash pagination"
          [filter]="currentFilter()"
          [totalItems]="bankCashStore.count()"
          [pageSizeOptions]="pageSizeOptions"
          (filterChange)="onPaginationFilterChange($event)"
        />
      </div>
    </div>
  </tng-card>
</main>
