<main class="trading-page">
  <app-page-heading
    eyebrow="Trading"
    title="Customer Receipts"
    description="Manage payments received from customers."
  >
    <app-crud-filter-popover
      ariaLabel="Customer receipt filters"
      title="Filter receipts"
      [fields]="filterFields"
      [filter]="crudQuery.filter()"
      syncUrl
    />

    <tng-button type="button" appearance="solid" tone="primary" (click)="createReceipt()">
      <tng-icon icon="plus" aria-hidden="true" />
      New Receipt
    </tng-button>
  </app-page-heading>

  <tng-card variant="outline" padding="lg">
    @if (customerReceiptStore.error()) {
      <div class="notice notice--danger">{{ customerReceiptStore.error() }}</div>
    }

    <div class="table-stack">
      <tng-table
        ariaLabel="Customer receipts"
        density="comfortable"
        [columns]="columns"
        [items]="customerReceiptStore.items()"
        [loading]="customerReceiptStore.isLoading()"
        [error]="hasError()"
        [sortActive]="crudQuery.sortActive()"
        [sortDirection]="crudQuery.sortDirection()"
        (sortChange)="crudQuery.applySort($event)"
      >
        <ng-template tngTableCellTemplate="date" let-row="row">
          {{ formatDate(row.date) }}
        </ng-template>

        <ng-template tngTableCellTemplate="customer" let-row="row">
          {{ row.customer?.name || '—' }}
        </ng-template>

        <ng-template tngTableCellTemplate="amount" let-row="row">
          {{ formatAmount(row.amount) }}
        </ng-template>

        <ng-template tngTableCellTemplate="currencycode" let-row="row">
          {{ row.currencycode || '—' }}
        </ng-template>

        <ng-template tngTableCellTemplate="bcash" let-row="row">
          {{ row.bcash?.name || '—' }}
        </ng-template>

        <ng-template tngTableCellTemplate="description" let-row="row">
          {{ row.description || '—' }}
        </ng-template>

        <ng-template tngTableCellTemplate="actions" let-row="row">
          <div class="row-actions">
            <button
              type="button"
              class="action-icon"
              aria-label="Edit customer receipt"
              (click)="editReceipt(row)"
            >
              <tng-icon icon="pencil" aria-hidden="true" />
            </button>
            <button
              type="button"
              class="action-icon action-icon--danger"
              aria-label="Delete customer receipt"
              (click)="deleteReceipt(row)"
            >
              <tng-icon icon="trash2" aria-hidden="true" />
            </button>
          </div>
        </ng-template>
      </tng-table>

      <div class="table-footer">
        <app-crud-paginator
          ariaLabel="Customer receipt pagination"
          [filter]="crudQuery.filter()"
          [totalItems]="customerReceiptStore.count()"
          [pageSizeOptions]="crudQuery.pageSizeOptions()"
          syncUrl
        />
      </div>
    </div>
  </tng-card>
</main>
