<main class="invoice-page">
  <header class="invoice-header">
    <h1>{{ title() }}</h1>
  </header>

  @if (purchaseReturnStore.error()) {
    <div class="notice notice--danger">{{ purchaseReturnStore.error() }}</div>
  }

  <div class="invoice-layout">
    <!-- ══ LEFT COLUMN ════════════════════════════════════════════════════ -->
    <div class="invoice-main">
      <app-pr-invoice-ref />
      <app-pr-line-items />
    </div>

    <!-- ══ RIGHT COLUMN ══════════════════════════════════════════════════ -->
    <aside class="invoice-aside">
      <app-pr-return-details />
    </aside>
  </div>

  <!-- ── Footer ───────────────────────────────────────────────────────── -->
  <div class="invoice-actions">
    <app-burl-back-button label="Cancel" />
    <app-burl-create-button
      [type]="'button'"
      [label]="mode() === 'edit' ? 'Update Return' : 'Create Return'"
      [disabled]="purchaseReturnStore.isLoading()"
      (clicked)="submitForm($event)"
    />
  </div>
</main>
