<tng-card variant="outline" padding="lg">
  <tng-card-header>
    <tng-card-title>Return Details</tng-card-title>
  </tng-card-header>
  <tng-card-content>
    @if (readOnly()) {
      <dl class="aside-fields aside-fields--read">
        <div class="detail-field">
          <dt>Number</dt>
          <dd>{{ draft.number() || '—' }}</dd>
        </div>
        <div class="detail-field">
          <dt>Date</dt>
          <dd>{{ formatDate(draft.date()) }}</dd>
        </div>
        <div class="detail-field">
          <dt>Due Date</dt>
          <dd>{{ formatDate(draft.duedate()) }}</dd>
        </div>
        @if (draft.description()) {
          <div class="detail-field detail-field--wide">
            <dt>Description</dt>
            <dd>{{ draft.description() }}</dd>
          </div>
        }
      </dl>
    } @else {
      <div class="aside-fields">
        <tng-form-field labelPosition="outline">
          <tng-label forId="ret-number">Number</tng-label>
          <tng-input
            id="ret-number"
            [value]="draft.number()"
            (valueChange)="draft.number.set($any($event))"
          />
        </tng-form-field>

        <tng-form-field labelPosition="outline" [invalid]="draft.dateError() !== null">
          <tng-label forId="ret-date" required>Date</tng-label>
          <app-fiscal-year-datepicker
            id="ret-date"
            [value]="draft.date()"
            [invalid]="draft.dateError() !== null"
            (valueChange)="draft.onDateChange($event)"
          />
          <tng-error [show]="draft.dateError() !== null">{{ draft.dateError() }}</tng-error>
        </tng-form-field>

        <tng-form-field labelPosition="outline">
          <tng-label forId="ret-duedate">Due Date</tng-label>
          <tng-datepicker
            id="ret-duedate"
            [adapter]="datepickerAdapter.adapter()"
            [value]="draft.duedate()"
            [minDate]="draft.date()"
            (valueChange)="draft.onDueDateChange($event)"
          />
        </tng-form-field>

        <tng-form-field labelPosition="outline">
          <tng-label forId="ret-description">Description</tng-label>
          <tng-textarea
            id="ret-description"
            rows="2"
            resize="vertical"
            [value]="draft.description()"
            (valueChange)="draft.description.set($any($event))"
          />
        </tng-form-field>
      </div>
    }
  </tng-card-content>
</tng-card>
