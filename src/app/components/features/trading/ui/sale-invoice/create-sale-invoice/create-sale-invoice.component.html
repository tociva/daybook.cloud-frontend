<main class="invoice-page">
  <header class="invoice-header">
    <h1>{{ title() }}</h1>
  </header>

  @if (saleInvoiceStore.error()) {
    <div class="notice notice--danger">{{ saleInvoiceStore.error() }}</div>
  }

  <div class="invoice-layout">
    <!-- ══ LEFT COLUMN ══════════════════════════════════════════════════════ -->
    <div class="invoice-main">
      <app-si-customer />
      <app-si-line-items />
    </div>

    <!-- ══ RIGHT COLUMN ════════════════════════════════════════════════════ -->
    <aside class="invoice-aside">
      <app-si-invoice-details />
    </aside>
  </div>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <div class="invoice-actions">
    <app-burl-back-button label="Cancel" />
    <tng-button
      type="button"
      appearance="solid"
      tone="primary"
      [disabled]="saleInvoiceStore.isLoading()"
      (click)="submitForm($event)"
    >
      <tng-icon icon="save" aria-hidden="true" />
      {{ mode() === 'edit' ? 'Update Invoice' : 'Create Invoice' }}
    </tng-button>
  </div>
</main>
