<main class="invoice-page">
  <header class="invoice-header">
    <h1>{{ title() }}</h1>
  </header>

  @if (saleInvoiceStore.error()) {
    <div class="notice notice--danger">{{ saleInvoiceStore.error() }}</div>
  }

  <div class="invoice-layout">
    <!-- ══ LEFT COLUMN ══════════════════════════════════════════════════════ -->
    <div
      class="invoice-main"
      tngFileUpload
      [multiple]="true"
      [disabled]="isSaving()"
      (filesSelected)="onDocumentFilesSelected($event)"
      (filesRejected)="onDocumentFilesRejected($event)"
    >
      <app-si-customer (customerSelected)="onCustomerSelected()" />
      <app-si-line-items
        [documentFiles]="pendingDocumentFiles()"
        [documents]="
          saleInvoiceStore.selectedItem()?.id === id()
            ? (saleInvoiceStore.selectedItem()?.documents ?? [])
            : []
        "
        [documentsDisabled]="isSaving()"
        [documentsUploading]="isUploadingDocuments()"
        (documentFilesChange)="pendingDocumentFiles.set($event)"
        (documentRemove)="deleteDocument($event)"
      />
      <div class="invoice-drop-overlay" aria-hidden="true">
        <div class="invoice-drop-overlay__inner">
          <tng-icon icon="upload" aria-hidden="true" />
          <span>Drop files here</span>
        </div>
      </div>
    </div>

    <!-- ══ RIGHT COLUMN ════════════════════════════════════════════════════ -->
    <aside class="invoice-aside">
      <app-si-invoice-details [isEdit]="mode() === 'edit'" />
    </aside>
  </div>

  <!-- ── Actions ────────────────────────────────────────────────────────── -->
  <div class="invoice-actions">
    <app-burl-back-button label="Cancel" />
    @if (mode() === 'edit') {
      <tng-button
        type="button"
        appearance="outline"
        tone="neutral"
        [disabled]="isSaving() || isPreviewingPdf() || !id()"
        (click)="previewInvoicePdf()"
      >
        <tng-icon icon="download" aria-hidden="true" />
        Download PDF
      </tng-button>
    }
    <app-burl-create-button
      [type]="'button'"
      [label]="mode() === 'edit' ? 'Update Invoice' : 'Create Invoice'"
      [disabled]="isSaving()"
      (clicked)="submitForm($event)"
    />
  </div>

  @if (mode() === 'edit' && id(); as saleInvoiceId) {
    <section class="invoice-receipts-panel" aria-label="Sale invoice receipts">
      <app-sale-invoice-receipts-panel [invoiceId]="saleInvoiceId" />
    </section>
  }
</main>
