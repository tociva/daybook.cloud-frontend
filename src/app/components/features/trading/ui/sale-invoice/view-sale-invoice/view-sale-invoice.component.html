<main class="invoice-page">
  <header class="invoice-header">
    <h1>View Sale Invoice</h1>
  </header>

  @if (saleInvoiceStore.error()) {
    <div class="notice notice--danger">{{ saleInvoiceStore.error() }}</div>
  }

  @if (saleInvoiceStore.isLoading() && !saleInvoiceStore.selectedItem()) {
    <div class="notice">Loading invoice…</div>
  } @else if (saleInvoiceStore.selectedItem()) {
    <div class="invoice-layout">
      <div class="invoice-main">
        <app-si-customer [readOnly]="true" />
        <app-si-line-items [readOnly]="true" />
      </div>

      <aside class="invoice-aside">
        <app-si-invoice-details [readOnly]="true" />
      </aside>
    </div>
  } @else {
    <div class="notice">Invoice not found.</div>
  }

  <div class="invoice-actions">
    <app-burl-back-button label="Back" />
    <tng-button type="button" appearance="solid" tone="primary" (click)="editInvoice()">
      <tng-icon icon="pencil" aria-hidden="true" />
      Edit
    </tng-button>
    <tng-button type="button" appearance="solid" tone="danger" (click)="deleteInvoice()">
      <tng-icon icon="trash2" aria-hidden="true" />
      Delete
    </tng-button>
  </div>
</main>
