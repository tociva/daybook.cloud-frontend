<div class="invoice-gtd" aria-label="Grand total">
  <div class="invoice-gtd__label">Total Amount</div>
  <div class="invoice-gtd__value">
    <span class="invoice-gtd__symbol">{{ currencySymbol() }}</span>
    <span class="invoice-gtd__amount">{{ grandtotal() }}</span>
  </div>
  <div class="invoice-gtd__words">{{ amountInWords() }}</div>
  @if (showConvertedAmount()) {
    <div class="invoice-gtd__words">
      1 {{ currencySymbol() }} = {{ conversionRateDisplay() }} {{ branchCurrencySymbol() }}
    </div>
    <div class="invoice-gtd__words">
      {{ branchCurrencySymbol() }} {{ convertedAmountDisplay() }} - {{ convertedAmountInWords() }}
    </div>
  }
</div>
