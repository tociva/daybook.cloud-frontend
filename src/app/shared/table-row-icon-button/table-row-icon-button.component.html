@if (isAllowed()) {
<tng-button
  class="row-action-btn"
  type="button"
  appearance="ghost"
  [tone]="tone()"
  size="sm"
  [attr.aria-label]="ariaLabel()"
  [disabled]="disabled()"
  (click)="onAction()"
>
  <tng-icon [icon]="icon()" [class.spin]="icon() === 'loaderCircle'" aria-hidden="true" />
</tng-button>
}
