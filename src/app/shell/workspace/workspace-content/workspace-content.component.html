<main class="workspace-main" [attr.aria-busy]="isRouteLoading() ? 'true' : null">
  @if (isRouteLoading()) {
    <section
      class="workspace-route-skeleton"
      aria-label="Loading page"
      aria-live="polite"
      role="status"
    >
      <header class="workspace-route-skeleton__header">
        <div class="workspace-route-skeleton__copy">
          <tng-skeleton width="14rem" height="1.6rem"></tng-skeleton>
          <tng-skeleton width="22rem" height="0.9rem"></tng-skeleton>
        </div>

        <div class="workspace-route-skeleton__actions" aria-hidden="true">
          @for (action of skeletonActions; track action) {
            <tng-skeleton width="6.5rem" height="2.25rem"></tng-skeleton>
          }
        </div>
      </header>

      <section class="workspace-route-skeleton__panel" aria-hidden="true">
        <div class="workspace-route-skeleton__toolbar">
          <tng-skeleton width="18rem" height="2.25rem"></tng-skeleton>
          <tng-skeleton width="8rem" height="2.25rem"></tng-skeleton>
        </div>

        <div class="workspace-route-skeleton__table">
          <div class="workspace-route-skeleton__table-head">
            <tng-skeleton width="36%" height="1rem"></tng-skeleton>
            <tng-skeleton width="20%" height="1rem"></tng-skeleton>
            <tng-skeleton width="16%" height="1rem"></tng-skeleton>
            <tng-skeleton width="10%" height="1rem"></tng-skeleton>
          </div>

          @for (row of skeletonRows; track row) {
            <div class="workspace-route-skeleton__table-row">
              <tng-skeleton width="100%" height="2.4rem"></tng-skeleton>
              <tng-skeleton width="100%" height="2.4rem"></tng-skeleton>
              <tng-skeleton width="100%" height="2.4rem"></tng-skeleton>
              <tng-skeleton width="100%" height="2.4rem"></tng-skeleton>
            </div>
          }
        </div>
      </section>
    </section>
  }

  <div
    class="workspace-outlet"
    [class.workspace-outlet--loading]="isRouteLoading()"
    [attr.aria-hidden]="isRouteLoading() ? 'true' : null"
  >
    <router-outlet />
  </div>
</main>
