<tng-button
  type="button"
  appearance="outline"
  tone="neutral"
  size="sm"
  class="docs-global-search-trigger"
  aria-label="Open search"
  (click)="openPalette()"
  (keydown)="onSearchBtnKeydown($event)"
>
  <tng-icon icon="search" class="docs-global-search-trigger__icon"></tng-icon>
  <span>Search</span>
  <kbd class="docs-global-search-trigger__shortcut">{{ searchShortcutHint }}</kbd>
</tng-button>

<tng-command-palette
  class="workspace-search-overlay"
  [open]="open()"
  [query]="query()"
  [options]="results()"
  placeholder="Search..."
  (openChange)="open.set($event)"
  (queryChange)="query.set($event)"
  (optionSelect)="onOptionSelect($event)"
/>
