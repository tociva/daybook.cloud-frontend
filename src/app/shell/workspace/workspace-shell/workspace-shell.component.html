<div class="workspace-shell">

    [activeOrganizationLabel]="activeOrganizationLabel()"
    [activeOrganizationId]="activeOrganizationId()"
    [activeBranchName]="activeBranchName()"
    [activeFiscalYearName]="activeFiscalYearName()"
